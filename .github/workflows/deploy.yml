name: Deploy til GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rettigheder, som GitHub Pages-deployment kræver
permissions:
  contents: read
  pages: write
  id-token: write

# Kør én deployment ad gangen; afbryd igangværende ved nyt push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Hent repoet
        uses: actions/checkout@v4

      - name: Konfigurér Pages
        uses: actions/configure-pages@v5

      - name: Upload site (hele roden — rent statisk)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
